<!DOCTYPE html>
<html>
<head>
    <base href="#(basepath??)"/>
    <meta charset="utf-8"/>
    #if(need_always_https)
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    #end
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
    #@bootstrapcss?()
</head>
<body>
<div class="user-select-none" style="margin: 20px auto;max-width: 500px">
    #if(msg&&msg=="jbolt_system_locked")
    <script type="text/javascript">
        showLockSystem();
    </script>
    #else
    <div class="alert alert-danger">#(msg??)</div>
    #end
</div>
<script type="text/javascript">
    function showLockSystem() {
        if (self != top) {
            parent.showJboltLockSystem();
        } else {
            showJboltLockSystem();
        }
    }

	window.onload = function() {
        if(parent.hideParentLayerDialogBtn){
            parent.hideParentLayerDialogBtn(0);
        }
	}

</script>
</body>
</html>
