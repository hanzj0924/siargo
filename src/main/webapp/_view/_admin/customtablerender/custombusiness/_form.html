<form onsubmit="return false;" id="CustomBusiness_Form" action="#(action)" method="post">
	#if(customBusiness.id??)
	<input type="hidden" name="customBusiness.id" value="#(customBusiness.id??)" />
	#end
<div class="row">
<div class="col" >
<div class="form-group row" >
<label class="col-sm-3 col-form-label">业务名称</label>
<div class="col-10">
    <input type="text"    data-rule="required" data-notnull="true" data-tips="请输入业务名称"  data-with-clearbtn="true" autocomplete="off"  class="form-control" placeholder="请输入业务名称" maxlength="40" name="customBusiness.name" value="#(customBusiness.name??)"/>
</div>
</div>
<div class="form-group row" >
<label class="col-sm-3 col-form-label">备注信息</label>
<div class="col-10">
    <textarea style="height:100px;" data-with-clearbtn="true" autocomplete="off"  class="form-control"  placeholder="请输入备注信息" maxlength="200" name="customBusiness.remark">#(customBusiness.remark??)</textarea>
</div>
</div>
<div class="form-group row" 
data-radio
data-name="customBusiness.enable"
data-value-attr="sn"
data-default="false"
data-url="admin/dictionary/options?key=options_enable"
data-label="是否启用"
data-width="col-sm-3,col-10"
data-value="#(customBusiness.enable??)"
data-rule="radio"
data-notnull="true"
data-tips="请输入是否启用"
data-inline="true"
>
</div>
</div>
</div>
</form>
#define js()
<script>
</script>
#include("/_view/_admin/common/_formjs.html",formId="CustomBusiness_Form")
#end
