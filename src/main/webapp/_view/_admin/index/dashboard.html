#@jboltLayout()
#define main()
#set(pageId=RandomUtil.random(6))
<!--主页面内容显示区域 start-->
<div class="jbolt_page shadow-none bg-transparent" data-key="#(pmkey)" data-require-plugin="morris" data-init-handler="initDashboard_#(pageId)" style="padding:0px 10px;">
<div class="jbolt_page_content p-0" >
		<div class="row">
				<div class="col-lg-3 col-md-6 col-sm-12 px-2">
					<div class="card border-0  mb-2 jb-dashboard-card hand">
						<div class="card-body p-4 text-nowrap">
							<span class="float-left"><i class="jbicon jb-zhiliangrenwu j_font_30 j_left_fa text-primary rounded"></i></span>
							<div class="text-right ">
								<span class="d-block  j_font_24" id="currentMonthTotal">#(dashboard.currentMonthTotal ??)</span>
								<span class="d-block">本年度送检总量/只</span>
							</div>
						</div>
					</div>
				</div>
				<div class="col-lg-3 col-md-6 col-sm-12 px-2">
					<div class="card border-0  mb-2 jb-dashboard-card hand">
						<div class="card-body p-4 text-nowrap">
							<span class="float-left"><i class="jbicon jb-zhiliangbz j_font_30 j_left_fa text-success rounded"></i></span>
							<div class="text-right ">
								<span class="d-block  j_font_24">#(dashboard.cTotal ??)</span>
								<span class="d-block">本年度传感器总量/只</span>
							</div>
						</div>
					</div>
					
				</div>
				<div class="col-lg-3 col-md-6 col-sm-12 px-2">
					<div class="card border-0  mb-2 jb-dashboard-card hand">
						<div class="card-body p-4 text-nowrap">
							<span class="float-left"><i class="jbicon jb-suyuanzhijianbz j_font_30 j_left_fa text-info rounded"></i></span>
							<div class="text-right ">
								<span class="d-block  j_font_24">#(dashboard.xTotal ??)</span>
								<span class="d-block">本年度小流量总量/只</span>
							</div>
						</div>
					</div>
				</div>
				<div class="col-lg-3 col-md-6 col-sm-12 px-2">
					<div class="card border-0  mb-2 jb-dashboard-card hand">
						<div class="card-body p-4 text-nowrap">
							<span class="float-left"><i class="jbicon jb-zlgl j_font_30 j_left_fa text-danger rounded"></i></span>
							<div class="text-right ">
								<span class="d-block  j_font_24">#(dashboard.dTotal ??)</span>
								<span class="d-block">本年大流量总量/只</span>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="row mt-2">
				<div class="col-lg-12 col-sm-12 px-2">
					<div class="card border-0  mb-2">
						<div class="card-body" style="height:350px">
							<h5 class="card-title"><span>送检总量(包含退修)/只</span><a tabindex="-1" data-fullscreenbtn data-target="parent.card" class="pull-right text-black-50"><i class="jbicon2 jbi-fullscreen"></i></a></h5>
							<div id="morris-bar_#(pageId)" style="height:90%;"></div>
						</div>
					</div>
				</div>
			</div>
			<div class="row mt-2">
					<div class="col-lg-9 col-sm-12 px-2">
						<div class="card border-0  mb-2">
							<div class="card-body" style="height:300px">
								<h5 class="card-title"><span>退修总量/只</span><a tabindex="-1" data-fullscreenbtn data-target="parent.card" class="pull-right text-black-50"><i class="jbicon2 jbi-fullscreen"></i></a></h5>
								<div id="morris-line_#(pageId)" style="height:90%;"></div>
							</div>
						</div>
					</div>
					<div class="col-lg-3 col-md-12 px-2">
					<div class="card border-0  mb-2">
						<div class="card-body"  style="height:300px">
							<h5 class="card-title"><span>本年度报告单来源/订单</span><a tabindex="-1" data-fullscreenbtn data-target="parent.card" class="pull-right text-black-50"><i class="jbicon2 jbi-fullscreen"></i></a></h5>
								<div id="morris-donut_#(pageId)" style="height:90%"></div>
						</div>
					</div>
					</div>
			</div>
	</div>
</div>
<!--主页面内容显示区域 end-->
#end
#define js()
<script type="text/javascript">
var DashBoardUtil_#(pageId)={
		init:function(){
            //creating line chart
            var $lineData = #json(repfixdata);
            this.createLineChart('morris-line_#(pageId)',  $lineData, 'x', ['a'], ['返修单量']);

            //creating bar chart
            var $barData = #json(repalldata);
            
            this.createBarChart('morris-bar_#(pageId)', $barData, 'y', ['a', 'b', 'c'], ['传感器', '小流量', '大流量'], ['#4c84ff', '#10c888', '#f43f5d'])

            //creating donut chart
            var $donutData = #json(donutData);
            this.createDonutChart('morris-donut_#(pageId)', $donutData, ['#00a5a8', "#f43f5d", '#10c888', '#d1d337']);

		},
		createAreaChart :function (element, pointSize, lineWidth, data, xkey, ykeys, labels, lineColors) {
		        Morris.Area({
		            element: element,
		            pointSize: 0,
		            lineWidth: 0,
		            data: data,
		            xkey: xkey,
		            ykeys: ykeys,
		            labels: labels,
		            resize: true,
		            gridLineColor: '#eee',
		            hideHover: 'auto',
		            lineColors: lineColors,
		            fillOpacity: .6,
		            behaveLikeLine: true
		        });
		    },
		      createBarChart :function (element, data, xkey, ykeys, labels, lineColors) {
		            // 动态计算合理的 Y 轴最大值
		            var maxValue = 0;
		            for (var i = 0; i < data.length; i++) {
		                for (var j = 0; j < ykeys.length; j++) {
		                    var val = data[i][ykeys[j]];
		                    if (val > maxValue) {
		                        maxValue = val;
		                    }
		                }
		            }
		            // 统一按 1000 粒度向上取整，最小保证 ymax >= 1000
		            var ymax = Math.ceil(maxValue / 1000) * 1000;
		            if (ymax < 1000) { ymax = 1000; }
		                  
		            Morris.Bar({
		                element: element,
		                data: data,
		                xkey: xkey,
		                ykeys: ykeys,
		                labels: labels,
		                gridLineColor: '#eee',
		                barSizeRatio: 0.6,
		                resize: true,
		                hideHover: 'auto',
		                barColors: lineColors,
		                stacked: false,
		                ymax: ymax
		            });
		        },
		        
		         //creates Line chart
		       createLineChart : function (element, data, xkey, ykeys, labels) {
		            Morris.Line({
		                element: element,
			            data: data,
			            xkey: xkey,
			            ykeys: ykeys,
			            labels: labels,
			             resize: true,
		                hideHover: 'auto'
		            });
		        },createDonutChart : function (element, data, colors) {
		            Morris.Donut({
		                element: element,
		                data: data,
		                resize: true,
		                colors: colors,
		            });
		        }

}

function initDashboard_#(pageId)(){
	$("#morris-line_#(pageId)").empty();
	$("#morris-bar_#(pageId)").empty();
	$("#morris-donut_#(pageId)").empty();
	DashBoardUtil_#(pageId).init();
}


</script>
#end
