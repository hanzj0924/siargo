<style>
.equip-section-header {
	display: flex;
	align-items: center;
	margin-bottom: 0.8rem;
	padding-bottom: 0.5rem;
	border-bottom: 2px solid #e9ecef;
}
.equip-section-header i {
	font-size: 1.1rem;
	color: #667eea;
	margin-right: 0.5rem;
}
.equip-section-header span {
	font-size: 0.95rem;
	font-weight: 600;
	color: #343a40;
	letter-spacing: 0.5px;
}
.equip-section-header::after {
	content: '';
	flex: 1;
	height: 2px;
	background: linear-gradient(to right, #e9ecef, transparent);
	margin-left: 0.8rem;
}
.equip-form-group {
	margin-bottom: 0.6rem;
}
.equip-form-group label {
	font-size: 0.85rem;
	color: #495057;
}
.equip-form-group .form-control {
	font-size: 0.85rem;
}
/* 缩小日期选择器面板，避免弹窗出现滚动条 */
.layui-laydate {
	transform: scale(0.4);
	transform-origin: top left;
}
</style>
<form onsubmit="return false;" id="equipmentRepairForm" action="#(action)" method="post">
<input type="hidden" name="equipmentRepair.id" value="#(equipmentRepair.id??)" />
<input type="hidden" name="equipmentRepair.equipmentId" value="#(equipmentId ?? equipmentRepair.equipmentId ??)" />
<input type="hidden" name="equipmentRepair.comparisonId" value="#(comparisonId ?? equipmentRepair.comparisonId ??)" />

<div class="row align-items-start">
	<div class="col">
		<!-- 维修信息 -->
		<div class="equip-section-header">
			<i class="fa fa-wrench"></i>
			<span>维修信息</span>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">维修类型</label>
			<div class="col input-group">
				<select class="form-control" name="equipmentRepair.repairType"
					data-rule="select">
					<option value="">=请选择维修类型=</option>
					<option value="1" #if(equipmentRepair.repairType?? == 1) selected #end>公司维修</option>
					<option value="2" #if(equipmentRepair.repairType?? == 2) selected #end>寄出维修</option>
				</select>
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">维修日期</label>
			<div class="col">
				<input type="text" data-date data-type="date" data-fmt="yyyy-MM-dd"
					readonly="readonly" autocomplete="off" class="form-control"
					data-rule="required" placeholder="请设置维修/送修日期"
					maxlength="10" name="equipmentRepair.repairDate"
					value="#date(equipmentRepair.repairDate,'yyyy-MM-dd')" />
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">故障描述</label>
			<div class="col">
				<textarea class="form-control"
					placeholder="请输入故障描述" maxlength="500"
					name="equipmentRepair.faultDescription" rows="3">#(equipmentRepair.faultDescription??)</textarea>
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">维修措施</label>
			<div class="col">
				<textarea class="form-control"
					placeholder="请输入维修措施" maxlength="500"
					name="equipmentRepair.repairAction" rows="3">#(equipmentRepair.repairAction??)</textarea>
			</div>
		</div>
		
	</div>
	<div class="col">
		<!-- 维修结果 -->
		<div class="equip-section-header">
			<i class="fa fa-check-square"></i>
			<span>维修结果</span>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">维修结果</label>
			<div class="col input-group">
				<select class="form-control" name="equipmentRepair.repairResult"
					data-rule="select">
					<option value="">=请选择维修结果=</option>
					<option value="1" #if(equipmentRepair.repairResult?? == 1) selected #end>维修中</option>
					<option value="2" #if(equipmentRepair.repairResult?? == 2) selected #end>已完成</option>
					<option value="3" #if(equipmentRepair.repairResult?? == 3) selected #end>无法修复</option>
				</select>
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">完成日期</label>
			<div class="col">
				<input type="text" data-date data-type="date" data-fmt="yyyy-MM-dd"
					readonly="readonly" autocomplete="off" class="form-control"
					placeholder="请设置维修完成日期"
					maxlength="10" name="equipmentRepair.completionDate"
					value="#date(equipmentRepair.completionDate,'yyyy-MM-dd')" />
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">维修人/维修单位</label>
			<div class="col">
				<input type="text" autocomplete="off" class="form-control"
					placeholder="请输入维修人/维修单位" maxlength="50"
					name="equipmentRepair.repairer" value="#(equipmentRepair.repairer??)" />
			</div>
		</div>
	</div>
</div>

</form>
#define js()
<script>
</script>
#include("/_view/_admin/common/_formjs.html",formId="equipmentRepairForm")
#end
