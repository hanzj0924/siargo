<style>
.equip-section-header {
	display: flex;
	align-items: center;
	margin-bottom: 0.8rem;
	padding-bottom: 0.5rem;
	border-bottom: 2px solid #e9ecef;
}
.equip-section-header i {
	font-size: 1.1rem;
	color: #667eea;
	margin-right: 0.5rem;
}
.equip-section-header span {
	font-size: 0.95rem;
	font-weight: 600;
	color: #343a40;
	letter-spacing: 0.5px;
}
.equip-section-header::after {
	content: '';
	flex: 1;
	height: 2px;
	background: linear-gradient(to right, #e9ecef, transparent);
	margin-left: 0.8rem;
}
.equip-form-group {
	margin-bottom: 0.6rem;
}
.equip-form-group label {
	font-size: 0.85rem;
	color: #495057;
}
.equip-form-group .form-control {
	font-size: 0.85rem;
}
/* 缩小日期选择器面板，避免弹窗出现滚动条 */
.layui-laydate {
	transform: scale(0.4);
	transform-origin: top left;
}
</style>
<form onsubmit="return false;" id="equipmentRecordForm" action="#(action)" method="post">
<input type="hidden" name="equipmentRecord.id" value="#(equipmentRecord.id??)" />
<input type="hidden" name="equipmentRecord.equipmentId" value="#(equipmentId ?? equipmentRecord.equipmentId ??)" />
<input type="hidden" name="equipmentRecord.batchId" value="#(batchId ?? equipmentRecord.batchId ??)" />

<div class="row align-items-start">
	<div class="col">
		<!-- 记录信息 -->
		<div class="equip-section-header">
			<i class="fa fa-clipboard"></i>
			<span>记录信息</span>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">处理人</label>
			<div class="col input-group">
				<select class="form-control" data-autoload data-refresh="true"
					data-url="admin/user/options" name="equipmentRecord.userId"
					data-text="=请选择处理人=" data-value-attr="id" data-rule="select"
					data-text-attr="name" data-select="#(equipmentRecord.userId ??)"
					data-select-type="select2" id="userSelect">
				</select>
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">记录类型</label>
			<div class="col input-group">
				<select class="form-control" data-autoload
					data-url="admin/dictionary/options?key=siargo_equipment_record_type"
					data-value-attr="sn"
					data-rule="select"
					data-select="#(equipmentRecord.recordType??)"
					name="equipmentRecord.recordType">
				</select>
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">事件日期</label>
			<div class="col">
				<input type="text" data-date data-type="datetime" data-fmt="yyyy-MM-dd HH:mm:ss"
					readonly="readonly" autocomplete="off" class="form-control"
					data-rule="required" placeholder="请设置事件日期时间"
					maxlength="19" name="equipmentRecord.recordDate"
					value="#date(equipmentRecord.recordDate,'yyyy-MM-dd HH:mm:ss')" />
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">事件描述</label>
			<div class="col">
				<textarea class="form-control" data-rule="required"
					placeholder="请输入事件描述" maxlength="500"
					name="equipmentRecord.description" rows="3">#(equipmentRecord.description??)</textarea>
			</div>
		</div>
	</div>
	<div class="col">
		<!-- 证书图片 -->
		<div class="equip-section-header">
			<i class="fa fa-certificate"></i>
			<span>证书信息</span>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">证书日期</label>
			<div class="col">
				<input type="text" data-date data-type="date" data-fmt="yyyy-MM-dd"
					readonly="readonly" autocomplete="off" class="form-control"
					 placeholder="请设置证书日期"
					maxlength="10" name="equipmentCertificate.certificateDate"
					value="#date(equipmentCertificate.certificateDate,'yyyy-MM-dd')" />
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">证书描述</label>
			<div class="col">
				<textarea class="form-control" 
					placeholder="请输入证书描述" maxlength="500"
					name="equipmentCertificate.remark" rows="3">#(equipmentCertificate.remark??)</textarea>
			</div>
		</div>
		<div class="form-group row equip-form-group">
			<label class="col-sm-3 col-form-label">证书图片</label>
			<div class="col">
				<input type="hidden" id="certificateImageUrls" name="certificateImageUrls" value="#(certificateImageUrls??)" />
				<div class="j_img_uploder"
					data-handler="uploadFile"
					data-url="/admin/siargo/equipment/certificate/uploadImages?save=true"
					data-hiddeninput="certificateImageUrls"
					data-value="#(certificateImageUrls??)"
					data-area="120,120"
					data-maxsize="102400"
					style="width:120px;height:120px;">
				</div>
			</div>
		</div>
	</div>
</div>

</form>
#define js()
<script>
</script>
#include("/_view/_admin/common/_formjs.html",formId="equipmentRecordForm")
#end
