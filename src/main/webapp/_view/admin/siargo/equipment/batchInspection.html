#@jboltLayout()
#define main()
<div class="jbolt_page">
<div class="jbolt_page_content p-3">
	<form onsubmit="return false;" id="batchInspectionForm" action="admin/siargo/equipment/batchInspection" method="post">
		<input type="hidden" name="ids" value="#(ids ??)" />
		<div class="form-group row">
			<label class="col-sm-4 col-form-label">上次检校日期</label>
			<div class="col-sm-8">
				<input type="text" data-date data-type="date" data-fmt="yyyy-MM-dd" readonly="readonly" autocomplete="off" class="form-control" placeholder="请选择上次检校日期" data-tips="请选择上次检校日期" maxlength="10" name="lastInspectionDate" value="" />
			</div>
		</div>
		<div class="form-group row">
			<label class="col-sm-4 col-form-label">下次检校日期</label>
			<div class="col-sm-8">
				<input type="text" data-date data-type="date" data-fmt="yyyy-MM-dd" readonly="readonly" autocomplete="off" class="form-control" placeholder="请选择下次检校日期" data-tips="请选择下次检校日期" maxlength="10" name="nextInspectionDate" value="" />
			</div>
		</div>
	</form>
</div>
</div>
#end
#define js()
<script>
</script>
#include("/_view/_admin/common/_formjs.html",formId="batchInspectionForm")
#end
