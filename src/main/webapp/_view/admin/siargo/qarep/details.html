#@jboltLayout() #define main()
<div class="jbolt_page">
	<div class="jbolt_page_content">
			<div class="row">
				<div class="col">
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">订单号</label>
						<div class="col">
							<input type="number" disabled class="form-control" value="#(qapro.order_id ??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">客户名称</label>
						<div class="col">
							<select class="form-control" data-autoload disabled
								data-url="admin/siargo/qarep/getCustName"
								data-value-attr="id" data-text-attr="name"
								data-select-type="select2" data-select="#(qapro.cust_id??)">
							</select>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">报告单类型</label>
						<div class="col input-group">
							<select class="form-control" data-autoload disabled
								data-url="admin/siargo/qarep/getDict?keywords=rep_type"
								data-value-attr="dickey" data-text-attr="dicvalue"
								data-select="#(qapro.repType ??)">
							</select>
						</div>
						<label class="col-sm-3 col-form-label">报告单版号</label>
						<div class="col input-group">
							<select class="form-control" data-autoload disabled
								data-url="admin/siargo/qarep/getDict?keywords=pdfver"
								data-value-attr="dickey" data-text-attr="dicvalue"
								data-select="#(qapro.sp_pdfver ??)">
							</select>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">产品类型</label>
						<div class="col input-group">
							<select class="form-control" data-autoload disabled
								data-url="admin/siargo/qarep/getDict?keywords=prod_type"
								data-value-attr="dickey" data-text-attr="dicvalue"
								data-select="#(qapro.sp_type??)">
							</select>
						</div>
					</div>
					<div class="form-group row">

						<label class="col-sm-3 col-form-label">检验进度</label>
						<div class="col input-group">
							<select class="form-control" data-autoload disabled
								data-url="admin/siargo/qarep/getDict?keywords=insp"
								data-value-attr="dickey" data-text-attr="dicvalue"
								data-select="#(qapro.insp ??)">
							</select>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">流量范围</label>
						<div class="col input-group">
							<input type="text" disabled class="form-control" value="#(qapro.sp_flow_range_name??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">整机电流</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_cuc??)" />
						</div>
					</div>
				</div>
				<div class="col">
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">整机电流 24v</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_cucmax??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">整机电流 8v</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_cucimin??)" />
						</div>
					</div>

					<div class="form-group row">
						<label class="col-sm-3 col-form-label">脉冲电压</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_pv??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">热头电压</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_thv??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">零点内码</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_zp??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">故障电平</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_fl??)" />
						</div>
					</div>
				</div>
			</div>
			<div class="row">
				<div class="col">
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">送检数量</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_qsi??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">检验数量</label>
						<div class="col">
							<input type="text" disabled class="form-control" value="#(qapro.sp_qi??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">型号</label>
						<div class="col">
							<input type="text" class="form-control" disabled value="#(qapro.sp_modle??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">编号</label>
						<div class="col">
							<input type="text" class="form-control" disabled value="#(qapro.sp_number??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">备注</label>
						<div class="col">
							<input type="text" class="form-control" disabled value="#(qapro.sp_des??)" />
						</div>
					</div>
				</div>
			</div>
	</div>
</div>
#end
