#@jboltLayout() #define main()
<style>
.fm-wrap {
	padding: 16px 18px;
	font-size: 13px;
	color: #333;
	line-height: 1.6
}

.fm-sec {
	margin-bottom: 14px
}

.fm-hd {
	display: flex;
	align-items: center;
	margin-bottom: 10px
}

.fm-hd span {
	font-size: 14px;
	font-weight: 600;
	color: #2c3e50
}

.fm-hd i {
	flex: 1;
	height: 1px;
	background: #dee2e6;
	margin-left: 10px
}

.fm-card {
	border: 1px solid #e9ecef;
	border-radius: 6px;
	padding: 12px 16px;
	background: #fff
}

.fm-card .col-form-label {
	color: #6c757d;
	font-weight: 500;
	font-size: 12px
}

.fm-card .form-control {
	border-radius: 4px;
	font-size: 13px
}

.fm-card .form-control:focus {
	border-color: #80bdff;
	box-shadow: 0 0 0 .15rem rgba(0, 123, 255, .15)
}
</style>
<div class="jbolt_page">
	<div class="jbolt_page_content">
		<form onsubmit="return false;" id="qareportForm"
			action="admin/siargo/qarep/save" method="post">
			<input type="hidden" name="qareport.id" value="#(qareport.id??)" />
			<div class="fm-wrap">

				<!-- 上半部分：左右两栏 -->
				<div class="row">
					<!-- 左栏：报告单信息 + 产品信息 -->
					<div class="col">
						<!-- 报告单信息 -->
						<div class="fm-sec">
							<div class="fm-hd">
								<span>&#128203; 报告单信息</span><i></i>
							</div>
							<div class="fm-card">
								<div class="form-group row">
									<label class="col-auto col-form-label">类型</label>
									<div class="col input-group">
										<select class="form-control" data-autoload
											name="qareport.repType"
											data-url="admin/dictionary/options?key=siargo_rep_type"
											data-rule="select" data-tips="请选择报告单类型" data-text="=请选择="
											data-value="" data-value-attr="sn"
											data-select="#(qareport.repType ??)">
										</select>
									</div>
									<label class="col-auto col-form-label">版号</label>
									<div class="col input-group">
										<select class="form-control" data-autoload
											name="product.pdfver"
											data-url="admin/dictionary/options?key=siargo_pdfver"
											data-rule="select" data-tips="请选择版号" data-value=""
											data-value-attr="sn"
											data-select="#(qareport.pdfver ??)">
										</select>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">订单号</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" class="form-control" data-rule="pint"
											placeholder="=请填写=" maxlength="10" name="qareport.orderId"
											value="#(qareport.orderId??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">客户名称</label>
									<div class="col input-group">
										<select class="form-control " data-autoload
											data-refresh="true" data-url="admin/siargo/qarep/getCustName"
											name="qareport.custId" data-text="=请选择=" data-value-attr="id"
											data-rule="select" data-text-attr="name"
											data-select="#(qareport.custId ??)"
											data-select-type="select2" id="custSelect">
										</select>
										<div class="input-group-append">
											<button class="btn btn-outline-secondary" type="button"
												data-dialogbtn data-area="350,250"
												data-handler="refreshCustSelect" data-title="新增客户"
												data-url="admin/siargo/customer/add">
												<i class="fa fa-plus"></i>
											</button>
										</div>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">检验进度</label>
									<div class="col input-group">
										<select class="form-control" data-autoload name="product.insp"
											data-rule="select" data-tips="请选择检验进度" data-value=""
											data-options="精度待检:1,精度已检:2"
											data-select="#(qareport.insp ??)">
										</select>
									</div>
								</div>
							</div>
						</div>
						<!-- 产品信息 -->
						<div class="fm-sec">
							<div class="fm-hd">
								<span>&#128230; 产品信息</span><i></i>
							</div>
							<div class="fm-card">
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">产品类型</label>
									<div class="col input-group">
										<select class="form-control" data-autoload name="product.type"
											data-url="admin/dictionary/options?key=siargo_prod_type"
											data-rule="select" data-tips="请选择产品类型" data-text="=请选择="
											data-value="" data-value-attr="sn"
											data-select="#(qareport.prodType ??)">
										</select>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">送检数量</label>
									<div class="col">
										<textarea class="form-control" style="height: 35px"
											data-rule="required" placeholder="如果多型号，英文逗号分割"
											data-tips="如果多型号，英文逗号分割" maxlength="500" name="qsis"
											data-with-clearbtn="true"></textarea>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">检验数量</label>
									<div class="col">
										<textarea class="form-control" style="height: 35px"
											data-rule="required" placeholder="如果多型号，英文逗号分割"
											data-tips="如果多型号，英文逗号分割" maxlength="500" name="qis"
											data-with-clearbtn="true"></textarea>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">型号</label>
									<div class="col">
										<textarea class="form-control" style="height: 50px"
											data-rule="required" placeholder="如果多型号，英文逗号分割"
											data-tips="如果多型号，英文逗号分割" maxlength="500" name="models"
											data-with-clearbtn="true"></textarea>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">编号</label>
									<div class="col">
										<textarea class="form-control" style="height: 50px"
											data-rule="required" placeholder="如果多型号，英文逗号分割"
											data-tips="如果多型号，英文逗号分割" maxlength="500" name="numbers"
											data-with-clearbtn="true"></textarea>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-2 col-form-label">备注</label>
									<div class="col">
										<textarea class="form-control"
											style="height: 50px; white-space: pre;"
											placeholder="如果多型号，英文逗号分割" data-tips="如果多型号，英文逗号分割"
											maxlength="900" name="dess" data-with-clearbtn="true"></textarea>
									</div>
								</div>
							</div>
						</div>
					</div>

					<!-- 右栏：技术参数 -->
					<div class="col">
						<!-- 技术参数 -->
						<div class="fm-sec">
							<div class="fm-hd">
								<span>&#9889; 大流量计参数</span><i></i>
							</div>
							<div class="fm-card">
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">流量范围</label>
									<div class="col input-group">
										<select class="form-control " data-autoload
											data-refresh="true"
											data-url="admin/dictionary/options?key=siargo_flow_range"
											name="product.flow_range" data-text="（选填）..."
											data-value-attr="sn" data-select="#(qareport.spFlowRange ??)"
											data-notnull="false" data-rule="select"
											data-select-type="select2">
										</select>
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">电池电压</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false"
											data-rule="siargo_tofixed_4" class="form-control"
											placeholder="（选填）3.2505-3.3495V" maxlength="6"
											name="product.bv" value="#(qareport.spBv??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">故障电平</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false"
											data-rule="siargo_tofixed_2" class="form-control"
											placeholder="（选填）≧2.7V" maxlength="5" name="product.fl"
											value="#(qareport.spFl??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">整机电流 24v</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false"
											data-rule="siargo_tofixed_2" class="form-control"
											placeholder="（选填）≤0.5mA/10~20mA" maxlength="5"
											name="product.cucmax" value="#(qareport.spCucmax??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">整机电流 12v</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false"
											data-rule="siargo_tofixed_2" class="form-control"
											placeholder="（选填）≤0.5mA/10~30mA" maxlength="5"
											name="product.cucmin" value="#(qareport.spCucimin??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">整机电流 8v</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false"
											data-rule="siargo_tofixed_2" class="form-control"
											placeholder="（选填）6-24mA" maxlength="5" name="product.cuc"
											value="#(qareport.spCuc??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">脉冲电压</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false"
											data-rule="siargo_tofixed_3" class="form-control"
											placeholder="（选填）≧2.7V/≧4.75V" maxlength="6"
											name="product.pv" value="#(qareport.spPv??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">本地地址</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false" data-rule="pint"
											class="form-control" placeholder="（选填）≤50" maxlength="2"
											name="product.la" value="#(qareport.spLa??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">热头电压</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false" data-rule="pint"
											class="form-control" placeholder="（选填）≤1690" maxlength="4"
											name="product.thv" value="#(qareport.spThv??)" />
									</div>
								</div>
								<div class="form-group row">
									<label class="col-sm-3 col-form-label">零点内码</label>
									<div class="col">
										<input type="text" data-with-clearbtn="true"
											autocomplete="off" data-notnull="false" data-rule="pint"
											class="form-control" placeholder="（选填）≤30" maxlength="2"
											name="product.zp" value="#(qareport.spZp??)" />
									</div>
								</div>
							</div>
						</div>
						<!-- 数据导入 -->
						<div class="fm-sec">
							<div class="fm-hd">
								<span>&#128229; 订单导入</span><i></i>
							</div>
							<div class="fm-card" style="display:flex;align-items:center;justify-content:center;padding:16px;gap:10px;">
								<div class="j_upload_file_box" data-name="file"
									data-btn-class="btn btn-success" data-placeholder="导入Excel"
									data-accept="excel" data-maxsize="20480"
									data-handler="uploadFile"
									data-url="admin/siargo/qarep/importExcel"
									data-upload-success-handler="uploadSuccessHandler"></div>
							</div>
						</div>
					</div>
				</div>

			</div>
		</form>
		#define js()
		<script>
			$(function() {
				setTimeout(
						function() {
							try {
								var $btnContainer = $(parent.document).find(
										'.layui-layer-btn:last');
								if ($btnContainer.length > 0
										&& $btnContainer
												.find('.mindray-notice').length === 0) {
									$btnContainer.css('position', 'relative');
									$btnContainer
											.append('<span class="mindray-notice" style="position:absolute;left:40%;top:50%;transform:translateY(-50%);color:red;font-size:30px;line-height:42px;pointer-events:none;">注意编号!</span>');
								}
							} catch (e) {
							}
						}, 300);
			});

			function refreshCustSelect() {
				SelectUtil.refresh($('#custSelect'));
			}

			function uploadSuccessHandler(uploader, type, fileInput, result) {
				var data = result.data;

				// 填充数据
				if (data.orderId) {
					$('input[name="qareport.orderId"]').val(data.orderId);
				}
				if (data.models) {
					$('textarea[name="models"]').val(data.models);
				}
				if (data.numbers) {
					$('textarea[name="numbers"]').val(data.numbers);
				}
				if (data.qsis) {
					$('textarea[name="qsis"]').val(data.qsis);
					$('textarea[name="qis"]').val(data.qsis);
				}
				if (data.repType) {
					$('select[name="qareport.repType"]').val(data.repType);
				}
			}
		</script>
		#include("/_view/_admin/common/_formjs.html",formId="qareportForm")
		#end


	</div>
</div>
#end
