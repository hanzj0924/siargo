#@jboltLayout() #define main()

<div class="jbolt_page">
	<div class="jbolt_page_content">
		<form onsubmit="return false;" id="qareportForm"
			action="admin/siargo/qarep/save" method="post">
			<input type="hidden" name="qareport.id" value="#(qareport.id??)" />
			<div class="row">
				<div class="col">
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">报告单类型</label>
						<div class="col input-group">
							<select class="form-control" data-autoload
								name="qareport.repType" style="width: 130px;"
								data-url="admin/dictionary/options?key=siargo_rep_type"
								data-rule="select" data-tips="请选择报告单类型" data-text="=请选择="
								data-value="" data-value-attr="sn"
								data-select="#(qareport.repType ??)">
							</select>
						</div>
						<label class="col-sm-3 col-form-label">报告单版号</label>
						<div class="col input-group">
							<select class="form-control" data-autoload name="product.pdfver"
								data-url="admin/dictionary/options?key=siargo_pdfver"
								data-rule="select" data-tips="请选择版号" data-value=""
								data-value-attr="sn" data-select="#(qareport.pdfver ??)">
							</select>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">订单号</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								class="form-control" data-rule="pint" placeholder="请输入订单号"
								maxlength="10" name="qareport.orderId"
								value="#(qareport.orderId??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">客户名称</label>
						<div class="col input-group">
							<select class="form-control " data-autoload data-refresh="true"
								data-url="admin/siargo/qarep/getCustName" name="qareport.custId"
								data-text="=请选择/搜索=" data-value-attr="id" data-rule="select"
								data-text-attr="name" data-select="#(qareport.custId ??)"
								data-select-type="select2" id="custSelect">
							</select>
							<div class="input-group-append">
								<button class="btn btn-outline-secondary" type="button"
									data-dialogbtn data-area="350,250"
									data-handler="refreshCustSelect" data-title="新增客户"
									data-url="admin/siargo/customer/add">
									<i class="fa fa-plus"></i>
								</button>
							</div>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">产品类型</label>
						<div class="col input-group">
							<select class="form-control" data-autoload name="product.type"
								data-url="admin/dictionary/options?key=siargo_prod_type"
								data-rule="select" data-tips="请选择产品类型" data-text="=请选择="
								data-value="" data-value-attr="sn"
								data-select="#(qareport.prodType ??)">
							</select>
						</div>
					</div>
					<div class="form-group row">

						<label class="col-sm-3 col-form-label">检验进度</label>
						<div class="col input-group">
							<select class="form-control" data-autoload name="product.insp"
								data-rule="select" data-tips="请选择检验进度" data-text="=请选择="
								data-value="" data-options="未检精度:1,已检精度:2"
								data-select="#(qareport.insp ??)">
							</select>
						</div>
					</div>

					<div class="form-group row">
						<label class="col-sm-3 col-form-label">流量范围</label>
						<div class="col input-group">
							<select class="form-control" data-autoload
								data-url="admin/dictionary/options?key=siargo_flow_range"
								name="product.flow_range" data-text="=请选择="
								data-value="" data-value-attr="sn" data-select="#(qareport.spFlowRange ??)"
								data-notnull="false" data-rule="select" data-tips="请选择流量范围">
							</select>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">电池电压</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="siargo_tofixed_4"
								class="form-control" placeholder="3.2505-3.3495V" maxlength="6"
								name="product.bv" value="#(qareport.spBv??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">故障电平</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="siargo_tofixed_2"
								class="form-control" placeholder="≧2.7V" maxlength="5"
								name="product.fl" value="#(qareport.spFl??)" />
						</div>
					</div>

				</div>
				<div class="col">
					<div class="text-right"
						style="padding-bottom: 0.5em; margin-bottom: 0.5em;">
						<!--  data-confirm="确认导入数据？" -->
						<div class="j_upload_file_box" data-name="file"
							data-btn-class="btn btn-success" data-placeholder="导入"
							data-accept="excel" data-maxsize="20480"
							data-handler="uploadFile"
							data-url="admin/siargo/qarep/importExcel"
							data-upload-success-handler="uploadSuccessHandler"></div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">整机电流 24v</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="siargo_tofixed_2"
								class="form-control" placeholder="≤0.5mA/10~20mA" maxlength="5"
								name="product.cucmax" value="#(qareport.spCucmax??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">整机电流 12v</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="siargo_tofixed_2"
								class="form-control" placeholder="≤0.5mA/10~30mA" maxlength="5"
								name="product.cucmin" value="#(qareport.spCucimin??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">整机电流 8v</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="siargo_tofixed_2"
								class="form-control" placeholder="6-24mA" maxlength="5"
								name="product.cuc" value="#(qareport.spCuc??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">脉冲电压</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="siargo_tofixed_3"
								class="form-control" placeholder="≧2.7V/≧4.75V" maxlength="6"
								name="product.pv" value="#(qareport.spPv??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">本地地址</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="pint" class="form-control"
								placeholder="≤50" maxlength="2" name="product.la"
								value="#(qareport.spLa??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">热头电压</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="pint" class="form-control"
								placeholder="≤1690" maxlength="4" name="product.thv"
								value="#(qareport.spThv??)" />
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-3 col-form-label">零点内码</label>
						<div class="col">
							<input type="text" data-with-clearbtn="true" autocomplete="off"
								data-notnull="false" data-rule="pint" class="form-control"
								placeholder="≤30" maxlength="2" name="product.zp"
								value="#(qareport.spZp??)" />
						</div>
					</div>


				</div>
			</div>
			<div class="row">
				<div class="col">
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">送检数量</label>
						<div class="col">
							<textarea class="form-control" style="height: 35px"
								data-rule="required" placeholder="如果多型号，英文逗号分割"
								data-tips="如果多型号，英文逗号分割" maxlength="500" name="qsis"
								data-with-clearbtn="true"></textarea>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">检验数量</label>
						<div class="col">
							<textarea class="form-control" style="height: 35px"
								data-rule="required" placeholder="如果多型号，英文逗号分割"
								data-tips="如果多型号，英文逗号分割" maxlength="500" name="qis"
								data-with-clearbtn="true"></textarea>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">型号</label>
						<div class="col">
							<textarea class="form-control" style="height: 50px"
								data-rule="required" placeholder="如果多型号，英文逗号分割"
								data-tips="如果多型号，英文逗号分割" maxlength="500" name="models"
								data-with-clearbtn="true"></textarea>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">编号</label>
						<div class="col">
							<textarea class="form-control" style="height: 50px"
								data-rule="required" placeholder="如果多型号，英文逗号分割"
								data-tips="如果多型号，英文逗号分割" maxlength="500" name="numbers"
								data-with-clearbtn="true"></textarea>
						</div>
					</div>
					<div class="form-group row">
						<label class="col-sm-1 col-form-label">备注</label>
						<div class="col">
							<textarea class="form-control"
								style="height: 50px; white-space: pre;"
								placeholder="如果多型号，英文逗号分割" data-tips="如果多型号，英文逗号分割"
								maxlength="900" name="dess" data-with-clearbtn="true"></textarea>
						</div>
					</div>
				</div>
			</div>
		</form>
		#define js()
		<script>
			$(function() {
				setTimeout(function() {
					try {
						var $btnContainer = $(parent.document).find('.layui-layer-btn:last');
						if ($btnContainer.length > 0 && $btnContainer.find('.mindray-notice').length === 0) {
							$btnContainer.css('position', 'relative');
							$btnContainer.append('<span class="mindray-notice" style="position:absolute;left:40%;top:50%;transform:translateY(-50%);color:red;font-size:30px;line-height:42px;pointer-events:none;">注意编号!</span>');
						}
					} catch (e) {}
				}, 300);
			});

			function refreshCustSelect(){
				SelectUtil.refresh($('#custSelect'));
			}
					
			function uploadSuccessHandler(uploader, type, fileInput, result) {
				var data = result.data;

				// 填充数据
				if (data.orderId) {
					$('input[name="qareport.orderId"]').val(data.orderId);
				}
				if (data.models) {
					$('textarea[name="models"]').val(data.models);
				}
				if (data.numbers) {
					$('textarea[name="numbers"]').val(data.numbers);
				}
				if (data.qsis) {
					$('textarea[name="qsis"]').val(data.qsis);
					$('textarea[name="qis"]').val(data.qsis);
				}
				if (data.repType) {
					$('select[name="qareport.repType"]').val(data.repType);
				}
			}
		</script>
		#include("/_view/_admin/common/_formjs.html",formId="qareportForm")
		#end


	</div>
</div>
#end
