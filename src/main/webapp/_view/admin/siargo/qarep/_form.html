<form onsubmit="return false;" id="qareportForm" action="#(action)" method="post">
<input type="hidden" name="qareport.id" value="#(qareport.id??)" />
<div class="row">
	<div class="col">
	<div class="form-group row">
		<label class="col-sm-3 col-form-label">订单号</label>
		<div class="col">
		<input type="text" autocomplete="off" data-autocomplete data-url="demo/userAutocomplete"  data-hiddeninput="orderId_hidden" class="form-control"  data-rule="required"  placeholder="请选择订单号"  data-tips="请选择订单号"  maxlength="200"/>
		<input type="hidden" autocomplete="off" id="orderId_hidden"  data-rule="required"  placeholder="请选择订单号"   data-tips="请选择订单号"  name="qareport.orderId" value="#(qareport.orderId??)" maxLength="19"/>
		</div>
	</div>

	<div class="form-group row">
		<label class="col-sm-3 col-form-label">报告单编号</label>
		<div class="col">
			<input type="text" data-with-clearbtn="true" autocomplete="off"  class="form-control"   data-rule="required" placeholder="请输入表单编号(Form Number)" maxlength="10" name="qareport.formnum" value="#(qareport.formnum??)"/>
		</div>
	</div>
	

	<div class="form-group row">
		<label class="col-sm-3 col-form-label">产品描述</label>
		<div class="col">
			<input type="text" data-with-clearbtn="true" autocomplete="off"
				class="form-control" data-rule="required" 
				placeholder="请输入产品描述(Product Description)" maxlength="500"
				name="qareport.productdes" value="#(qareport.productdes??)" />
		</div>
	</div>
	</div>
	<div class="col">
		<div class="form-group row">
			<label class="col-sm-3 col-form-label">客户名称</label>
			<div class="col">
				<select class="form-control" data-autoload
					data-url="admin/siargo/qarep/getCustName" name="qareport.custId"
					data-rule="select" data-tips="请选择客户"
					data-text="=请选择=" data-value="" data-value-attr="id"
					 data-select="#(qareport.custId ??)">
				</select>
			</div>
		</div>
		<div class="form-group row">
		<label class="col-sm-3 col-form-label">报告单类型</label>
		<div class="col input-group">
			<select class="form-control" data-autoload name="qareport.repType"
				data-url="admin/siargo/qarep/getDict?keywords=rep_type" 
				data-rule="select" data-tips="请选择报告单类型"
				data-text="=请选择=" data-value="" 
				data-value-attr="dickey" data-text-attr="dicvalue"
				 data-select="#(qareport.repType ??)">
			</select>
		</div>
	</div>
	<div class="form-group row">
		<label class="col-sm-3 col-form-label">产品类型</label>
		<div class="col input-group">
			<select class="form-control" data-autoload name="qareport.prodType"
				data-url="admin/siargo/qarep/getDict?keywords=prod_type" 
				data-rule="select" data-tips="请选择产品类型"
				data-text="=请选择=" data-value="" 
				data-value-attr="dickey" data-text-attr="dicvalue"
				 data-select="#(qareport.prodType ??)">
			</select>
		</div>
	</div>
	<div class="form-group row">
		<label class="col-sm-3 col-form-label">检验进度</label>
			<div class="col">
				<select class="form-control" data-autoload name="qareport.insp"
					data-url="admin/siargo/qarep/getDict?keywords=insp" 
					data-rule="select" data-tips="请选择检验进度"
					data-text="=请选择=" data-value="" 
					data-value-attr="dickey" data-text-attr="dicvalue"
					 data-select="#(qareport.insp ??)">
				</select>
			</div>
	</div>
	</div>
</div>

</form>
#define js()
<script>
</script>
#include("/_view/_admin/common/_formjs.html",formId="qareportForm")
#end
